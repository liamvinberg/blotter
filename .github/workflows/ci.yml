name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    # macOS: the CLI suite is currently macOS-validated only; Linux support is
    # tracked as its own work item (see the linux-suite issue).
    runs-on: macos-latest
    timeout-minutes: 15
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # The CLI test suite drives real destination flows against a real rclone binary.
      - run: brew install rclone
      - run: pnpm -C apps/cli typecheck
      - run: pnpm -C apps/cli test
      - run: pnpm -C apps/cloud typecheck
      - run: pnpm -C apps/cloud test
      - run: pnpm -C apps/web typecheck
      - run: pnpm -C apps/web build
      - run: pnpm check
